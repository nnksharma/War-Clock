<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>दी-War Clock | The Resolution Engine</title>
    <style>
        :root {
            --accent: #ffb400; /* Tactical Amber/Gold */
            --bg: #080808;
            --panel: rgba(15, 15, 15, 0.9);
        }

        body {
            background-color: var(--bg);
            background-image: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)),
                              url('https://images.unsplash.com/photo-1451187580459-43490279c0fa?auto=format&fit=crop&q=80&w=2000');
            background-size: cover;
            background-position: center;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .main-container {
            background: var(--panel);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,180,0,0.2);
            padding: 40px;
            border-radius: 2px;
            text-align: center;
            width: 450px;
            box-shadow: 0 0 50px rgba(0,0,0,1);
        }

        /* --- THE DEVANAGARI WORDPLAY --- */
        .title-brand {
            font-size: 1.8rem;
            letter-spacing: 2px;
            margin-bottom: 5px;
            font-weight: 300;
        }

        .hindi-text {
            color: var(--accent);
            font-weight: bold;
            font-family: 'Arial Unicode MS', 'Lohit Hindi', sans-serif;
        }

        .subtitle {
            font-size: 0.7rem;
            text-transform: uppercase;
            color: rgba(255,255,255,0.4);
            letter-spacing: 4px;
            margin-bottom: 30px;
            border-bottom: 1px solid rgba(255,180,0,0.1);
            padding-bottom: 10px;
        }

        /* --- ANALOG DIAL --- */
        .clock-box {
            position: relative;
            width: 240px;
            height: 240px;
            margin: 0 auto 20px;
            border: 1px solid rgba(255,180,0,0.1);
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,180,0,0.05) 0%, transparent 70%);
        }

        .hand {
            position: absolute;
            bottom: 50%;
            left: 50%;
            transform-origin: bottom;
            background: var(--accent);
            border-radius: 2px;
            transition: transform 2s cubic-bezier(0.19, 1, 0.22, 1);
        }

        .hour-hand { width: 4px; height: 60px; margin-left: -2px; }
        .min-hand { width: 2px; height: 95px; margin-left: -1px; background: #fff; }

        .digital-time {
            font-size: 4rem;
            font-family: 'Courier New', monospace;
            color: #fff;
            margin: 10px 0;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
            text-align: left;
        }

        .stat-val { font-family: 'Courier New', monospace; color: var(--accent); font-size: 1.1rem; }
        .stat-name { font-size: 0.6rem; text-transform: uppercase; opacity: 0.5; }

    </style>
</head>
<body>

<div class="main-container">
    <div class="title-brand">
        <span class="hindi-text">दी-</span>War Clock
    </div>
    <div class="subtitle">Resolution Engine</div>

    <div class="clock-box">
        <div id="h-hand" class="hand hour-hand"></div>
        <div id="m-hand" class="hand min-hand"></div>
    </div>

    <div class="digital-time" id="d-time">--:--</div>
    
    <div class="grid">
        <div>
            <div class="stat-name">Brent Crude</div>
            <div class="stat-val" id="oil">$ --</div>
        </div>
        <div>
            <div class="stat-name">Net Shift</div>
            <div class="stat-val" id="shift">-- m</div>
        </div>
        <div>
            <div class="stat-name">Kinetic Events</div>
            <div class="stat-val" id="kinetic">0</div>
        </div>
        <div>
            <div class="stat-name">Last Update</div>
            <div class="stat-val" id="time" style="font-size: 0.7rem;">--</div>
        </div>
    </div>
</div>

<script>
    async function update() {
        try {
            const r = await fetch('clock_state.json');
            const d = await r.json();
            document.getElementById('d-time').innerText = d.formatted_time;
            document.getElementById('h-hand').style.transform = `rotate(${(d.current_minutes/60)*30}deg)`;
            document.getElementById('m-hand').style.transform = `rotate(${(d.current_minutes%60)*6}deg)`;
            document.getElementById('oil').innerText = "$" + d.latest_oil_price.toFixed(2);
            document.getElementById('shift').innerText = (d.last_shift > 0 ? "+" : "") + d.last_shift + "m";
            document.getElementById('kinetic').innerText = d.ai_readout.kinetic_events;
            document.getElementById('time').innerText = new Date(d.timestamp).toLocaleTimeString();
        } catch(e) { console.log(e); }
    }
    update();
</script>

</body>
</html>

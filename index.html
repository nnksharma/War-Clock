<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RESOLUTION CLOCK | TACTICAL HUD</title>
    <style>
        body {
            background-color: #05070a;
            /* Using a public satellite map image as a faded background */
            background-image: linear-gradient(rgba(5, 7, 10, 0.85), rgba(5, 7, 10, 0.85)), 
                              url('https://upload.wikimedia.org/wikipedia/commons/thumb/2/23/Middle_East_topographic_map-blank.svg/1024px-Middle_East_topographic_map-blank.svg.png');
            background-size: cover;
            background-position: center;
            color: #00ff41; /* "Matrix" / Radar Green */
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .hud-frame {
            border: 1px solid rgba(0, 255, 65, 0.3);
            background: rgba(0, 10, 0, 0.7);
            padding: 30px;
            border-radius: 5px;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 80%;
            max-width: 900px;
        }

        .header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid rgba(0, 255, 65, 0.3);
            margin-bottom: 20px;
            padding-bottom: 5px;
            font-size: 0.8rem;
            letter-spacing: 2px;
        }

        /* --- ANALOG CLOCK DESIGN --- */
        .analog-clock {
            width: 250px;
            height: 250px;
            border: 4px solid #00ff41;
            border-radius: 50%;
            position: relative;
            margin: 20px 0;
            background: radial-gradient(circle, rgba(0,255,65,0.05) 0%, rgba(0,0,0,1) 100%);
            box-shadow: 0 0 15px rgba(0, 255, 65, 0.2);
        }

        /* Clock markings (the 12, 3, 6, 9 ticks) */
        .analog-clock::after {
            content: '';
            position: absolute;
            width: 100%; height: 100%;
            background: repeating-conic-gradient(from 0deg, #00ff41 0deg 1deg, transparent 1deg 90deg);
            border-radius: 50%;
            mask: radial-gradient(transparent 92%, black 93%);
        }

        .hand {
            position: absolute;
            bottom: 50%;
            left: 50%;
            transform-origin: bottom;
            background: #00ff41;
            border-radius: 10px;
            transition: transform 1s cubic-bezier(0.4, 2.3, 0.3, 1);
        }

        .hour-hand { width: 6px; height: 60px; margin-left: -3px; z-index: 3; }
        .min-hand { width: 4px; height: 90px; margin-left: -2px; z-index: 2; background: #fff; }

        /* --- DIGITAL HUD DISPLAY --- */
        .digital-readout {
            font-size: 4rem;
            font-weight: bold;
            margin: 10px 0;
            color: #fff;
            text-shadow: 0 0 10px #00ff41;
        }

        .stats-panel {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            width: 100%;
            margin-top: 20px;
            border-top: 1px solid rgba(0, 255, 65, 0.3);
            padding-top: 20px;
        }

        .stat-box { text-align: center; }
        .stat-label { font-size: 0.7rem; color: #00ff41; opacity: 0.7; margin-bottom: 5px; }
        .stat-value { font-size: 1.2rem; color: #fff; }

        .blinker {
            animation: blink 1s infinite;
            color: #ff3333;
            font-weight: bold;
        }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div class="hud-frame">
    <div class="header">
        <div>SYSTEM: RESOLUTION_ENGINE_V1.0</div>
        <div class="blinker">● LIVE_FEED</div>
    </div>

    <div class="analog-clock">
        <div id="hour-hand" class="hand hour-hand"></div>
        <div id="min-hand" class="hand min-hand"></div>
    </div>

    <div class="digital-readout" id="digital-clock">00:00</div>

    <div class="stats-panel">
        <div class="stat-box">
            <div class="stat-label">BRENT CRUDE</div>
            <div class="stat-value" id="oil-price">$--</div>
        </div>
        <div class="stat-box">
            <div class="stat-label">NET FLUX</div>
            <div class="stat-value" id="last-shift">--m</div>
        </div>
        <div class="stat-box">
            <div class="stat-label">KINETIC EVT</div>
            <div class="stat-value" id="kinetic-count">0</div>
        </div>
        <div class="stat-box">
            <div class="stat-label">DIPLOMACY</div>
            <div class="stat-value" id="treaty-count">0</div>
        </div>
    </div>

    <div style="margin-top: 20px; font-size: 0.6rem; opacity: 0.5;">
        COORDINATES: MIDDLE_EAST_ZONE | LAST_UPDATE: <span id="update-time">--</span>
    </div>
</div>

<script>
    async function updateHUD() {
        try {
            const response = await fetch('clock_state.json');
            const data = await response.json();

            // 1. Update Digital Display
            document.getElementById('digital-clock').innerText = data.formatted_time;

            // 2. Update Analog Hands
            // (Math: 1 minute = 6 degrees on a clock. 1 hour = 30 degrees)
            const totalMinutes = data.current_minutes;
            const hours = totalMinutes / 60;
            const mins = totalMinutes % 60;

            const hourDeg = (hours * 30);
            const minDeg = (mins * 6);

            document.getElementById('hour-hand').style.transform = `rotate(${hourDeg}deg)`;
            document.getElementById('min-hand').style.transform = `rotate(${minDeg}deg)`;

            // 3. Update Stats
            document.getElementById('oil-price').innerText = "$" + data.latest_oil_price.toFixed(2);
            document.getElementById('last-shift').innerText = (data.last_shift > 0 ? "+" : "") + data.last_shift + "m";
            document.getElementById('kinetic-count').innerText = data.ai_readout.kinetic_events;
            document.getElementById('treaty-count').innerText = data.ai_readout.international_treaties;
            document.getElementById('update-time').innerText = new Date(data.timestamp).toLocaleTimeString();

        } catch (error) {
            console.error("HUD Link Failure:", error);
        }
    }

    updateHUD();
</script>

</body>
</html>
